<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roth IRA Dashboard</title>
<style>
@keyframes spin{to{transform:rotate(360deg)}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f0f0f;color:#e8e8e8;min-height:100vh;padding:20px}
.wrap{max-width:520px;margin:0 auto}
.label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.balance{font-size:36px;font-weight:600;line-height:1.1;color:#fff}
.returns{font-size:13px;margin-top:4px}
.up{color:#21ce99}.dn{color:#ff5000}
.btn-row{display:flex;gap:8px;margin-top:14px}
.diag-btn{flex:1;padding:10px 14px;border:1px solid #333;border-radius:10px;background:rgba(255,230,80,0.08);color:#f5e050;font-size:12px;font-weight:500;cursor:pointer;text-align:center}
.diag-btn:hover{background:rgba(255,230,80,0.16)}
.refresh-btn{padding:10px 22px;border-radius:10px;background:#21ce99;color:#000;font-size:13px;font-weight:700;border:none;cursor:pointer;min-width:130px;display:flex;align-items:center;justify-content:center;gap:6px}
.refresh-btn:hover{background:#1ab888}
.refresh-btn:disabled{opacity:.45;cursor:not-allowed}
.spin-inf{display:inline-block;animation:spin 1s linear infinite;font-size:16px;line-height:1}
.divider{border:none;border-top:1px solid #222;margin:16px 0}
.holding-wrap{border-bottom:1px solid #1a1a1a}
.holding-wrap:last-child{border-bottom:none}
.holding{display:flex;align-items:center;gap:10px;padding:12px 0 5px}
.tick{font-size:13px;font-weight:700;width:48px;flex-shrink:0;color:#fff}
.spark{flex-shrink:0}
.meta{flex:1;min-width:0}
.shares-line{font-size:11px;color:#555}
.vals{text-align:right;flex-shrink:0;min-width:110px}
.cur-price{font-size:15px;font-weight:700;color:#fff}
.held-line{font-size:11px;color:#888;margin-top:1px}
.ret-line{font-size:11px;min-height:14px}
.supports{padding:0 0 11px 58px;display:flex;gap:5px;flex-wrap:wrap}
.s-pill{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(100,160,255,0.08);color:#5a90d8;border:1px solid rgba(100,160,255,0.18);white-space:nowrap}
.s-pill.dim{color:#444;border-color:#222;background:transparent}
.edit-row{display:none;padding:4px 0 10px;gap:8px;flex-wrap:wrap;align-items:center;padding-left:58px}
.edit-row.open{display:flex}
.edit-row input{width:105px;padding:5px 8px;border:1px solid #333;border-radius:8px;background:#1a1a1a;color:#e8e8e8;font-size:12px}
.edit-row input:focus{outline:none;border-color:#21ce99}
.edit-row button{padding:5px 12px;border-radius:8px;border:none;font-size:12px;cursor:pointer}
.save-btn{background:#21ce99;color:#000;font-weight:600}
.cancel-btn{background:#1a1a1a;color:#aaa;border:1px solid #333}
.pencil{font-size:12px;cursor:pointer;color:#444;margin-left:auto;padding:2px 4px;transition:color .15s}
.pencil:hover{color:#888}
.footer{font-size:10px;color:#444;text-align:center;margin-top:12px;padding-bottom:6px;line-height:1.6}
.status-bar{font-size:11px;color:#555;margin-top:6px;min-height:16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="label">Robinhood Roth IRA</div>
  <div class="balance" id="total-val">—</div>
  <div class="returns" id="total-ret"><span style="color:#555;font-size:12px">Press Refresh to load live prices</span></div>
  <div class="btn-row">
    <button class="diag-btn" id="diag-btn" onclick="copyDiag()">Run Diagnostic ↗</button>
    <button class="refresh-btn" id="refresh-btn" onclick="fetchAll()"><span id="refresh-label">↻ Refresh</span></button>
  </div>
  <div class="status-bar" id="status-bar"></div>
  <hr class="divider">
  <div id="holdings"></div>
  <div class="footer" id="footer-ts">Prices via Finnhub · tap ✏️ to edit any position</div>
</div>

<script>
var API_KEY = "d832a8hr01ql4ong0df0d832a8hr01ql4ong0dfg";
var BASE    = "https://finnhub.io/api/v1";
var STORAGE_KEY = "roth_ira_dashboard_v1";

var SUPPORTS = {
  COST: ["$1,028 — breakout base", "$985 — 100-day SMA", "$889 — 200-day SMA"],
  DVN:  ["$48.62 — S1 pivot",      "$46.80 — consolidation floor", "$43.50 — 200-day SMA"],
  ENTG: ["$125 — near-term base",  "$115 — prior consolidation",   "$100 — structural support"],
  HIVE: ["$2.90 — breakout base",  "$2.50 — weekly structure",     "$1.80 — mid-range support"],
  IREN: ["$45 — medium-term floor","$40 — structural support",     "$32 — 52-week range low"],
  MRVL: ["$160 — horizontal support","$148.70 — MA support line",  "$143.93 — swing floor"],
  NOW:  ["$87.94 — trend line",    "$85 — historical bounce zone", "$83 — multi-TF support"],
  RBLX: ["$42.89 — MA floor",      "$40.06 — Fibonacci base",      "$35 — deep support"],
  SHAZ: ["$52 — near-term floor", "$45 — mid-range support", "$38 — 52-week range low"],
  SNDK: ["$1,304 — pivot support", "$1,275 — prior breakout",      "$1,200 — accumulation zone"],
  TE:   ["$6.50 — 100-day SMA",    "$6.11 — MA support",           "$5.15 — prior base"],
};

var positions = [
  {ticker:"COST", shares:0.49432,   cost:1011.49, price:null},
  {ticker:"DVN",  shares:21.419575, cost:46.69,   price:null},
  {ticker:"ENTG", shares:3.338563,  cost:149.77,  price:null},
  {ticker:"HIVE", shares:75.301204, cost:3.32,    price:null},
  {ticker:"IREN", shares:19.675356, cost:50.83,   price:null},
  {ticker:"MRVL", shares:5.883737,  cost:169.96,  price:null},
  {ticker:"NOW",  shares:11.17693,  cost:89.47,   price:null},
  {ticker:"RBLX", shares:5.929791,  cost:42.16,   price:null},
  {ticker:"SHAZ", shares:4.06285,   cost:56.01,   price:null},
  {ticker:"SNDK", shares:0.666927,  cost:1472.60, price:null},
  {ticker:"TE",   shares:75.681893, cost:6.61,    price:null},
];
var editing = null;

function sleep(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }

function loadSaved(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    var d = JSON.parse(raw);
    if(d.pos){
      positions = positions.map(function(lp){
        var s = d.pos.find(function(x){ return x.ticker === lp.ticker; });
        if(s){
          return {
            ticker: lp.ticker,
            shares: parseFloat(s.shares) || lp.shares,
            cost:   parseFloat(s.cost)   || lp.cost,
            price:  (s.price != null && s.price !== "null") ? parseFloat(s.price) : null
          };
        }
        return lp;
      });
    }
    if(d.ts) document.getElementById("footer-ts").textContent = "Last saved · " + d.ts + " · tap ✏️ to edit";
  } catch(e){}
}

function saveData(){
  try{
    var now = new Date().toLocaleString();
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      pos: positions.map(function(p){
        return {ticker:p.ticker, shares:p.shares, cost:p.cost, price:p.price};
      }),
      ts: now
    }));
    return now;
  } catch(e){ return ""; }
}

async function fetchQuote(ticker){
  var url = BASE + "/quote?symbol=" + encodeURIComponent(ticker) + "&token=" + API_KEY;
  var r = await fetch(url);
  if(!r.ok) throw new Error("HTTP " + r.status);
  var d = await r.json();
  if(d.error) throw new Error(d.error);
  if(!d.c || d.c === 0) throw new Error("price=0");
  return d.c;
}

async function fetchAll(){
  var btn = document.getElementById("refresh-btn");
  var lbl = document.getElementById("refresh-label");
  var sb  = document.getElementById("status-bar");
  btn.disabled = true;
  lbl.innerHTML = '<span class="spin-inf">∞</span>';
  sb.textContent = "Connecting to Finnhub…";

  var errors = [];
  for(var i = 0; i < positions.length; i++){
    var ticker = positions[i].ticker;
    sb.textContent = "Fetching " + ticker + " (" + (i+1) + "/" + positions.length + ")…";
    try{
      positions[i].price = await fetchQuote(ticker);
    } catch(e){
      errors.push(ticker);
    }
    await sleep(200);
  }

  var now = saveData();
  btn.disabled = false;
  lbl.textContent = "↻ Refresh";

  if(errors.length === 0){
    sb.textContent = "";
    document.getElementById("footer-ts").textContent = "Live · " + now + " · tap ✏️ to edit";
  } else {
    sb.textContent = "⚑ Failed: " + errors.join(", ");
    document.getElementById("footer-ts").textContent = "Partial update · " + now;
  }
  render();
}

function f(n, d){
  if(d === undefined) d = 2;
  return n.toLocaleString("en-US",{minimumFractionDigits:d, maximumFractionDigits:d});
}
function pct(n){ return (n >= 0 ? "+" : "") + f(n) + "%"; }

function sparkHTML(up){
  var c   = up ? "#21ce99" : "#ff5000";
  var pts = up ? "2,14 6,10 10,12 14,6 22,2" : "2,2 6,8 10,6 14,12 22,14";
  return '<svg class="spark" width="24" height="16" viewBox="0 0 24 16">' +
         '<polyline points="' + pts + '" fill="none" stroke="' + c + '" stroke-width="1.5" stroke-linejoin="round"/></svg>';
}

function render(){
  var tv = 0, tc = 0;
  for(var i = 0; i < positions.length; i++){
    var p = positions[i];
    if(p.price != null){ tv += p.shares * p.price; tc += p.shares * p.cost; }
  }
  var gain = tv - tc;
  var gp   = tc ? (gain / tc) * 100 : 0;

  document.getElementById("total-val").textContent = tv > 0 ? "$" + f(tv) : "—";

  var retEl = document.getElementById("total-ret");
  if(tv > 0){
    var cls  = gain >= 0 ? "up" : "dn";
    var sign = gain >= 0 ? "+" : "-";
    retEl.innerHTML =
      '<span class="' + cls + '">' + sign + '$' + f(Math.abs(gain)) + ' (' + pct(gp) + ')</span>' +
      ' <span style="color:#555;font-size:11px">vs $' + f(tc) + ' cost</span>';
  } else {
    retEl.innerHTML = '<span style="color:#555;font-size:12px">Press Refresh to load live prices</span>';
  }

  var el = document.getElementById("holdings");
  el.innerHTML = "";

  for(var i = 0; i < positions.length; i++){
    (function(p, idx){
      var hp   = p.price != null;
      var val  = hp ? p.shares * p.price : 0;
      var cost = p.shares * p.cost;
      var ret  = val - cost;
      var rp   = cost ? (ret / cost) * 100 : 0;
      var up   = ret >= 0;

      var wrap = document.createElement("div");
      wrap.className = "holding-wrap";

      // --- holding row ---
      var row = document.createElement("div");
      row.className = "holding";

      var tickEl = document.createElement("div");
      tickEl.className = "tick";
      tickEl.textContent = p.ticker;
      row.appendChild(tickEl);

      var sparkEl = document.createElement("div");
      sparkEl.innerHTML = hp ? sparkHTML(up) : '<svg class="spark" width="24" height="16"></svg>';
      row.appendChild(sparkEl.firstChild);

      var metaEl = document.createElement("div");
      metaEl.className = "meta";
      var sharesEl = document.createElement("div");
      sharesEl.className = "shares-line";
      sharesEl.textContent = f(p.shares, 4) + " sh  ·  $" + f(p.cost) + " avg cost";
      metaEl.appendChild(sharesEl);
      row.appendChild(metaEl);

      var valsEl = document.createElement("div");
      valsEl.className = "vals";

      var priceEl = document.createElement("div");
      priceEl.className = "cur-price";
      priceEl.textContent = hp ? "$" + f(p.price) : "—";
      valsEl.appendChild(priceEl);

      var heldEl = document.createElement("div");
      heldEl.className = "held-line";
      heldEl.textContent = hp ? "$" + f(val) + " held" : "";
      valsEl.appendChild(heldEl);

      var retEl = document.createElement("div");
      retEl.className = "ret-line " + (up ? "up" : "dn");
      retEl.textContent = hp ? (up ? "+" : "-") + "$" + f(Math.abs(ret)) + " (" + pct(rp) + ")" : "";
      valsEl.appendChild(retEl);
      row.appendChild(valsEl);

      var pencil = document.createElement("span");
      pencil.className = "pencil";
      pencil.textContent = "✏️";
      pencil.onclick = function(){ toggleEdit(idx); };
      row.appendChild(pencil);

      wrap.appendChild(row);

      // --- support pills ---
      var supEl = document.createElement("div");
      supEl.className = "supports";
      var sup = SUPPORTS[p.ticker] || [];
      if(sup.length){
        sup.forEach(function(s){
          var pill = document.createElement("span");
          pill.className = "s-pill";
          pill.textContent = "▸ " + s;
          supEl.appendChild(pill);
        });
      } else {
        var pill = document.createElement("span");
        pill.className = "s-pill dim";
        pill.textContent = "no data";
        supEl.appendChild(pill);
      }
      wrap.appendChild(supEl);

      // --- edit row ---
      var editEl = document.createElement("div");
      editEl.className = "edit-row";
      editEl.id = "edit-" + idx;
      editEl.innerHTML =
        '<input id="ep-' + idx + '" type="number" step="0.01" placeholder="Price" value="' + (hp ? p.price : "") + '">' +
        '<input id="es-' + idx + '" type="number" step="0.000001" placeholder="Shares" value="' + p.shares + '">' +
        '<input id="ec-' + idx + '" type="number" step="0.01" placeholder="Avg cost" value="' + p.cost + '">' +
        '<button class="save-btn" onclick="saveEdit(' + idx + ')">Save</button>' +
        '<button class="cancel-btn" onclick="cancelEdit(' + idx + ')">Cancel</button>';
      wrap.appendChild(editEl);

      el.appendChild(wrap);
    })(positions[i], i);
  }
}

function toggleEdit(i){
  if(editing !== null && editing !== i) cancelEdit(editing);
  var row = document.getElementById("edit-" + i);
  if(!row) return;
  if(row.classList.contains("open")){ cancelEdit(i); } else { row.classList.add("open"); editing = i; }
}
function saveEdit(i){
  var pr = parseFloat(document.getElementById("ep-" + i).value);
  var sh = parseFloat(document.getElementById("es-" + i).value);
  var co = parseFloat(document.getElementById("ec-" + i).value);
  if(!isNaN(pr)) positions[i].price = pr;
  if(!isNaN(sh)) positions[i].shares = sh;
  if(!isNaN(co)) positions[i].cost = co;
  editing = null;
  saveData();
  render();
}
function cancelEdit(i){
  var row = document.getElementById("edit-" + i);
  if(row) row.classList.remove("open");
  editing = null;
}

function copyDiag(){
  var prompt = "Run full diagnostic on my Roth IRA — position by position with McGlone macro lens, Lavish liquidity read, and Weisberger market structure view";
  var btn = document.getElementById("diag-btn");
  navigator.clipboard.writeText(prompt).then(function(){
    btn.textContent = "✓ Copied!";
    setTimeout(function(){ btn.textContent = "Run Diagnostic ↗"; }, 2000);
  }).catch(function(){
    // fallback for browsers that block clipboard
    var ta = document.createElement("textarea");
    ta.value = prompt;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    btn.textContent = "✓ Copied!";
    setTimeout(function(){ btn.textContent = "Run Diagnostic ↗"; }, 2000);
  });
}

// Init
loadSaved();
render();
</script>
</body>
</html>
